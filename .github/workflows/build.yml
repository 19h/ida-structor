name: Build Structor Plugin

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  IDA_SDK_REPO: HexRaysSA/ida-sdk

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # IDA stable builds
          - os: macos-latest
            name: macos-x86_64
            cmake_arch: x86_64
            ida_branch: ""
            ida_suffix: ""
          - os: macos-latest
            name: macos-arm64
            cmake_arch: arm64
            ida_branch: ""
            ida_suffix: ""
          - os: ubuntu-latest
            name: linux-x86_64
            ida_branch: ""
            ida_suffix: ""
          - os: windows-latest
            name: windows-x86_64
            cmake_arch: x64
            ida_branch: ""
            ida_suffix: ""
          # IDA 9.3.1 release builds
          - os: macos-latest
            name: macos-x86_64
            cmake_arch: x86_64
            ida_branch: releases/9.3.1
            ida_suffix: "-ida931"
          - os: macos-latest
            name: macos-arm64
            cmake_arch: arm64
            ida_branch: releases/9.3.1
            ida_suffix: "-ida931"
          - os: ubuntu-latest
            name: linux-x86_64
            ida_branch: releases/9.3.1
            ida_suffix: "-ida931"
          - os: windows-latest
            name: windows-x86_64
            cmake_arch: x64
            ida_branch: releases/9.3.1
            ida_suffix: "-ida931"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}${{ matrix.ida_suffix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout IDA SDK (stable)
        if: matrix.ida_branch == ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IDA_SDK_REPO }}
          path: ida-sdk

      - name: Checkout IDA SDK (beta)
        if: matrix.ida_branch != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IDA_SDK_REPO }}
          ref: ${{ matrix.ida_branch }}
          path: ida-sdk

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.cmake_arch }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ccache

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v ccache >/dev/null 2>&1; then
            brew install ccache
          fi

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ccache ninja -y --no-progress
          "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH
          ccache --version
          ninja --version

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-v1-${{ runner.os }}-${{ matrix.name }}${{ matrix.ida_suffix }}-${{ hashFiles('CMakeLists.txt', 'test/CMakeLists.txt', 'include/**', 'src/**', '.github/workflows/build.yml') }}
          restore-keys: |
            ccache-v1-${{ runner.os }}-${{ matrix.name }}${{ matrix.ida_suffix }}-

      - name: Set ccache environment (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_BASEDIR=${{ github.workspace }}" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=true" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=1G" >> $GITHUB_ENV

      - name: Set ccache environment (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "CCACHE_DIR=$env:USERPROFILE\.ccache" >> $env:GITHUB_ENV
          "CCACHE_BASEDIR=${{ github.workspace }}" >> $env:GITHUB_ENV
          "CCACHE_COMPRESS=true" >> $env:GITHUB_ENV
          "CCACHE_MAXSIZE=1G" >> $env:GITHUB_ENV

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build
          cd build
          ccache --zero-stats || true
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            -DIDA_SDK_DIR=${{ github.workspace }}/ida-sdk/src

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p build
          cd build
          ccache --zero-stats || true
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DIDA_SDK_DIR=${{ github.workspace }}/ida-sdk/src

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir build -Force
          cd build
          ccache --zero-stats
          cmake .. -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER_LAUNCHER=ccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache `
            "-DIDA_SDK_DIR=${{ github.workspace }}/ida-sdk/src"

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          cd build
          cmake --build . --config Release -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Show ccache stats (Unix)
        if: runner.os != 'Windows'
        run: ccache --show-stats || true

      - name: Show ccache stats (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ccache --show-stats

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cd build
          cmake --build . --config Release

      - name: Find built plugin (Unix)
        if: runner.os != 'Windows'
        id: find_plugin_unix
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            PLUGIN_FILE=$(find build -name "structor.dylib" -type f | head -1)
            EXT="dylib"
          else
            PLUGIN_FILE=$(find build -name "structor.so" -type f | head -1)
            EXT="so"
          fi

          if [ -z "$PLUGIN_FILE" ]; then
            echo "ERROR: Could not find built plugin"
            find build -type f -name "structor*"
            exit 1
          fi

          echo "plugin_file=$PLUGIN_FILE" >> $GITHUB_OUTPUT
          echo "extension=$EXT" >> $GITHUB_OUTPUT
          echo "Found plugin: $PLUGIN_FILE"

      - name: Find built plugin (Windows)
        if: runner.os == 'Windows'
        id: find_plugin_windows
        shell: pwsh
        run: |
          $plugin = Get-ChildItem -Path build -Recurse -Filter "structor.dll" | Select-Object -First 1
          if ($null -eq $plugin) {
            Write-Error "Could not find built plugin"
            Get-ChildItem -Path build -Recurse -Filter "structor*"
            exit 1
          }
          echo "plugin_file=$($plugin.FullName)" >> $env:GITHUB_OUTPUT
          echo "extension=dll" >> $env:GITHUB_OUTPUT
          Write-Host "Found plugin: $($plugin.FullName)"

      - name: Prepare artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cp "${{ steps.find_plugin_unix.outputs.plugin_file }}" "artifacts/structor${{ matrix.ida_suffix }}_${{ matrix.name }}.${{ steps.find_plugin_unix.outputs.extension }}"

      - name: Prepare artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          cp "${{ steps.find_plugin_unix.outputs.plugin_file }}" "artifacts/structor${{ matrix.ida_suffix }}_${{ matrix.name }}.${{ steps.find_plugin_unix.outputs.extension }}"

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "${{ steps.find_plugin_windows.outputs.plugin_file }}" "artifacts/structor${{ matrix.ida_suffix }}_${{ matrix.name }}.${{ steps.find_plugin_windows.outputs.extension }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: structor${{ matrix.ida_suffix }}-${{ matrix.name }}
          path: artifacts/
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # Copy all plugin files
          find artifacts -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.dll" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
